<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Personal site — three directions</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" />

  <link rel="stylesheet" href="tokens.css" />

  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: "Geist", ui-sans-serif, system-ui, sans-serif;
      background: #f0eee9;
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="directions/b.jsx"></script>

  <script type="text/babel">
    const W = 1280;

    function App() {
      return (
        <DesignCanvas
          title="Personal site — Direction B"
          subtitle="Ingrid palette: Rosewood hero & contact · Ivory body · Dusty blue accents. Three pages — Home, About, Contact."
        >
          <DCSection
            id="portfolio"
            title="Portfolio"
            subtitle="Magazine-grid layout. Rosewood frames the experience; cases live on ivory; dusty blue used sparingly for italics, accents and CTA highlights."
          >
            <DCArtboard id="b-home"    label="Home"    width={W} height={4900}><HomeB /></DCArtboard>
            <DCArtboard id="b-about"   label="About"   width={W} height={2700}><AboutB /></DCArtboard>
            <DCArtboard id="b-contact" label="Contact" width={W} height={1100}><ContactB /></DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
